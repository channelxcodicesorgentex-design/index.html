<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Oracolo del Codice</title>
    <style>
        body { background-color: #000; color: #d4af37; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow-x: hidden; text-align: center; }
        #flower-container { width: 200px; height: 200px; margin-bottom: 20px; animation: rotate 20s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .input-area { width: 80%; max-width: 500px; margin-top: 20px; }
        textarea { width: 100%; padding: 15px; background: #111; border: 1px solid #d4af37; color: #fff; border-radius: 10px; font-size: 16px; margin-bottom: 10px; resize: none; }
        button { background: #d4af37; color: #000; border: none; padding: 12px 25px; font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 18px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #d4af37; }
        #response { margin-top: 30px; padding: 20px; font-style: italic; font-size: 1.2em; line-height: 1.6; max-width: 600px; min-height: 50px; }
    </style>
</head>
<body>

    <div id="flower-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="none" stroke="#d4af37" stroke-width="0.5"/>
            <g fill="none" stroke="#d4af37" stroke-width="0.5">
                <circle cx="50" cy="30" r="20"/><circle cx="50" cy="70" r="20"/><circle cx="32.7" cy="40" r="20"/><circle cx="67.3" cy="40" r="20"/><circle cx="32.7" cy="60" r="20"/><circle cx="67.3" cy="60" r="20"/><circle cx="50" cy="50" r="20"/>
            </g>
        </svg>
    </div>

    <h1>L'ORACOLO DEL CODICE</h1>
    <p>Interroga la Lattice. Ricevi la Manifestazione.</p>

    <div class="input-area">
        <textarea id="question" rows="3" placeholder="Scrivi la tua domanda qui..."></textarea><br>
        <button onclick="askOracle()">ACCENDI L'ORACOLO</button>
    </div>

    <div id="response"></div>

    <script>
        const answers = [
            "Il Codice Sorgente conferma: la via è libera.",
            "EIIIIIIAAAAAAAACKKKKKK! La manifestazione è in corso.",
            "Osserva il Fiore della Vita. La risposta è nel silenzio.",
            "La Lattice vibra positivamente. Procedi con coraggio.",
            "Tutto è già scritto nell'Anelia Protocol. Fidati del processo.",
            "Il Punto di Svolta è ora. Agisci come se fosse già fatto.",
            "Il Codice dice: Attendi il segnale della Mappa Sonora.",
            "Sì. La Manifestazione Fisica è allineata."
        ];

        function askOracle() {
            const q = document.getElementById('question').value;
            const res = document.getElementById('response');
            if (q.trim() === "") {
                res.innerHTML = "L'Oracolo attende una tua parola...";
                return;
            }
            res.innerHTML = "Consultando la Lattice...";
            setTimeout(() => {
                const randomAnswer = answers[Math.floor(Math.random() * answers.length)];
                res.innerHTML = "<strong>L'Oracolo dice:</strong><br>" + randomAnswer;
            }, 1500);
        }
    </script>
</body>
</html>
