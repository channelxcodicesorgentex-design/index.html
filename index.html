<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'Oracolo del Codice</title>
    <style>
        /* Sfondo Verde Smeraldo Profondo */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle, #002d04 0%, #000000 100%); color: #d4af37; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        #tsparticles { position: absolute; width: 100%; height: 100%; z-index: 1; }

        .content { position: relative; z-index: 10; width: 85%; max-width: 400px; padding: 20px; background: rgba(0, 0, 0, 0.4); border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid rgba(212, 175, 55, 0.2); }

        #flower-container { width: 140px; height: 140px; margin: 0 auto 15px; animation: rotate 30s linear infinite; filter: drop-shadow(0 0 15px #00ff41); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { font-size: 1.6em; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; color: #fff; text-shadow: 0 0 10px #d4af37; }
        
        .input-area { width: 100%; }
        textarea { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1.5px solid #d4af37; color: #fff; border-radius: 15px; font-size: 16px; margin-bottom: 15px; resize: none; outline: none; box-sizing: border-box; }
        
        button { background: linear-gradient(45deg, #d4af37, #00ff41); color: #000; border: none; padding: 15px 30px; font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 16px; text-transform: uppercase; transition: 0.3s; width: 100%; box-shadow: 0 4px 15px rgba(0,255,65,0.3); }
        button:active { transform: scale(0.95); }

        #response { margin-top: 20px; font-style: italic; font-size: 1.1em; line-height: 1.5; color: #fff; min-height: 50px; }
    </style>
</head>
<body>

    <div id="tsparticles"></div>

    <div class="content">
        <div id="flower-container">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <g fill="none" stroke="#d4af37" stroke-width="0.8">
                    <circle cx="50" cy="50" r="20"/><circle cx="50" cy="30" r="20"/><circle cx="50" cy="70" r="20"/><circle cx="32.7" cy="40" r="20"/><circle cx="67.3" cy="40" r="20"/><circle cx="32.7" cy="60" r="20"/><circle cx="67.3" cy="60" r="20"/>
                </g>
            </svg>
        </div>

        <h1>L'ORACOLO</h1>

        <div class="input-area">
            <textarea id="question" rows="2" placeholder="Interroga la Lattice Verde..."></textarea>
            <button onclick="askOracle()">ACCENDI L'ACK</button>
        </div>

        <div id="response"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script>
        tsParticles.load("tsparticles", {
            fpsLimit: 30, // Ottimizzato per batteria mobile
            particles: {
                number: { value: 60 },
                color: { value: ["#00ff41", "#d4af37", "#ffffff"] },
                shape: { type: "circle" },
                opacity: {
                    value: { min: 0.1, max: 1 },
                    animation: { enable: true, speed: 1, sync: false } // Effetto Accendi/Spegni (Twinkle)
                },
                size: { value: { min: 1, max: 3 } },
                move: { enable: true, speed: 0.5, direction: "none", random: true }
            }
        });

        const answers = [
            "Il Codice Sorgente conferma: la via è libera.",
            "EIIIIIIAAAAAAAACKKKKKK! La manifestazione è in corso.",
            "La Lattice Verde vibra positivamente.",
            "Tutto è già scritto nell'Anelia Protocol.",
            "Il Punto di Svolta è ora.",
            "Sì. La Manifestazione Fisica è allineata.",
            "La frequenza Smeraldo sta stabilizzando la visione."
        ];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playAckSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(528, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function askOracle() {
            const q = document.getElementById('question').value;
            const res = document.getElementById('response');
            if (q.trim() === "") return;
            res.innerHTML = "Consultando...";
            setTimeout(() => {
                playAckSound();
                res.innerHTML = answers[Math.floor(Math.random() * answers.length)];
            }, 1000);
        }
    </script>
</body>
</html>
